<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aviator Predictor Pro</title>
    <style>
        :root { --primary: #e61e1e; --bg: #0b0b0d; --card: #1c1c1e; --green: #00ff41; }
        body { font-family: sans-serif; background: var(--bg); color: white; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .app { width: 90%; max-width: 380px; background: var(--card); border-radius: 20px; padding: 25px; border: 1px solid #333; text-align: center; }
        .header { display: flex; justify-content: space-between; font-size: 12px; color: #888; margin-bottom: 20px; }
        .main-display { background: #000; border-radius: 15px; padding: 40px 10px; border: 2px solid var(--primary); margin-bottom: 20px; box-shadow: 0 0 20px rgba(230, 30, 30, 0.2); }
        #multiplier { font-size: 4rem; font-weight: bold; margin: 0; }
        .btn { background: var(--primary); border: none; color: white; width: 100%; padding: 18px; border-radius: 12px; font-weight: bold; font-size: 16px; cursor: pointer; text-transform: uppercase; }
        .btn:active { transform: scale(0.95); }
        .loading-bar { width: 100%; height: 4px; background: #333; margin-top: 15px; border-radius: 2px; overflow: hidden; display: none; }
        .loading-fill { height: 100%; background: var(--primary); width: 0%; transition: width 2s linear; }
        .probability { margin-top: 15px; font-size: 14px; color: var(--green); display: none; }
    </style>
</head>
<body>

<div class="app">
    <div class="header">
        <span id="time">12:00:00</span>
        <span>SERVER: CONNECTED</span>
    </div>
    
    <div class="main-display">
        <p style="margin:0; color:#888; font-size: 12px;">NEXT MULTIPLIER</p>
        <div id="multiplier">WAIT...</div>
    </div>

    <button class="btn" onclick="startAnalysis()">Start Analysis</button>
    
    <div class="loading-bar" id="bar"><div class="loading-fill" id="fill"></div></div>
    <div class="probability" id="prob">Accuracy: 98.4%</div>
</div>

<script>
    // Update Clock
    setInterval(() => {
        document.getElementById('time').innerText = new Date().toLocaleTimeString();
    }, 1000);

    function startAnalysis() {
        const btn = document.querySelector('.btn');
        const mult = document.getElementById('multiplier');
        const bar = document.getElementById('bar');
        const fill = document.getElementById('fill');
        const prob = document.getElementById('prob');

        btn.disabled = true;
        btn.innerText = "Syncing...";
        bar.style.display = "block";
        fill.style.width = "100%";
        mult.innerText = "---";
        mult.style.color = "#555";

        setTimeout(() => {
            // Simulated Algorithm
            const chance = Math.random();
            let result;
            if(chance < 0.6) result = (Math.random() * (2.5 - 1.2) + 1.2).toFixed(2);
            else if(chance < 0.9) result = (Math.random() * (8.0 - 2.5) + 2.5).toFixed(2);
            else result = (Math.random() * (40.0 - 8.0) + 8.0).toFixed(2);

            mult.innerText = result + "x";
            mult.style.color = "#fff";
            btn.disabled = false;
            btn.innerText = "Next Round";
            fill.style.width = "0%";
            bar.style.display = "none";
            prob.style.display = "block";
        }, 2500);
    }
</script>
</body>
</html>
